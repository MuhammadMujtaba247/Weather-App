<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Weather App</h1>
    </header>
    <main>
        <div id="input-div">
            <h3>Enter a city name:</h3>
            <input type="text" name="" id="">
            <button id="search-button">Search</button>
            <h4>
                <hr>or
                <hr>
            </h4>
            <button id="currentlocation-button">Use current location</button>
        </div>
        <div id="display-div">
            <h2>Current Info</h2>
            <div id="current-weather-div">
                <h4 id="current-name">City: </h4>
                <h4 id="current-temp">Temperature: </h4>
                <h4 id="current-feels-like">Feels like: </h4>
                <h4 id="current-humidity">Humidity: </h4>
                <h4 id="current-windspeed">Windspeed: </h4>
                <h4 id="current-weather-condition">Weather Condition: </h4>
                <img id="current-weather-icon" src="" alt="">
            </div>
            <h2>4-Day Forecast</h3>
                <div id="forecasts">

                </div>
        </div>
    </main>
</body>
<script src="app.js"></script>

</html>
